server.port=${PORT:8007}
spring.application.name=orders
management.endpoints.web.exposure.include=health,prometheus,info
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=orders

# Graceful shutdown — drain in-flight requests before exit
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=25s

# Structured JSON access + app logs to stdout (Spring Boot 3.4+)
logging.structured.format.console=ecs
server.tomcat.accesslog.enabled=true
server.tomcat.accesslog.directory=/dev
server.tomcat.accesslog.prefix=stdout
server.tomcat.accesslog.suffix=
server.tomcat.accesslog.buffered=false
server.tomcat.accesslog.pattern=%h %l %u %t "%r" %s %b %D "%{X-Request-Id}i"
spring.data.mongodb.uri=${MONGO_URL:mongodb://mongodb:27017/orders}
spring.rabbitmq.host=${AMQP_HOST:rabbitmq}
spring.rabbitmq.username=${AMQP_USER:guest}
spring.rabbitmq.password=${AMQP_PASS:guest}
notification.url=${NOTIFICATION_URL:http://notification:8008}
shipping.url=${SHIPPING_URL:http://shipping:8004}
